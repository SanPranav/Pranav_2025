<html lang="{{ page.lang | default: site.lang | default: "en" }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
  {% include custom-head.html %}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <header class="site-topbar" role="banner">
    <div class="wrapper topbar-inner">
      <button class="mobile-menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>

      <nav class="site-nav" aria-label="Primary navigation">
        <ul class="site-nav-list">
          <li><a href="{{ site.baseurl }}/">Home</a></li>
          <li><a href="{{ site.baseurl }}/about">About</a></li>
          <li><a href="{{ site.baseurl }}/myjourney">My Journey</a></li>
          <li><a href="{{ site.baseurl }}/blogs">Blogs</a></li>
          <li><a href="{{ site.baseurl }}/search">Search</a></li>
        </ul>
      </nav>
    </div>
  </header>
  
  <div class="mobile-nav-overlay"></div>

  <main id="main-content" class="page-content" aria-label="Content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <p>Built with focus, code, and consistency.</p>
    </div>
  </footer>
  
  <script src="{{ '/assets/js/mobile-nav.js' | relative_url }}"></script>
</body>
</html>
