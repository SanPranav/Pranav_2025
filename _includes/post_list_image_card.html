<article class="post-preview-card">
  {%- if post.image -%}
  <a class="post-preview-media" href="{{ post.url | relative_url }}" aria-label="Open {{ post.title | escape }}">
    <img alt="{{ post.title | escape }}" class="image-preview" src="{{ post.image | relative_url }}" />
  </a>
  {%- endif -%}

  <div class="post-preview-content">
    <h3>
      <a class="post-link" href="{{ post.url | relative_url }}">
        {{ post.title | escape }}
      </a>
    </h3>
    {%- if post.description -%}
    <p class="post-meta-description">{{ post.description }}</p>
    {%- endif -%}
    <p class="post-meta">{{ post.date | date: date_format }}</p>
  </div>
</article>
